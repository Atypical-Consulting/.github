name: .NET CI
on:
  workflow_call:
    inputs:
      dotnet-version:
        required: false
        type: string
        default: '10.0.x'
      solution:
        required: false
        type: string
        default: ''

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ inputs.dotnet-version }}
      - name: Restore
        run: dotnet restore ${{ inputs.solution }}
      - name: Build
        run: dotnet build ${{ inputs.solution }} --no-restore --configuration Release
      - name: Test
        run: dotnet test ${{ inputs.solution }} --no-build --configuration Release --verbosity normal
