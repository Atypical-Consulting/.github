name: Node.js CI
on:
  workflow_call:
    inputs:
      node-version:
        required: false
        type: string
        default: 'lts/*'
      package-manager:
        required: false
        type: string
        default: 'npm'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.package-manager }}
      - name: Install (npm)
        if: inputs.package-manager == 'npm'
        run: npm ci
      - name: Install (yarn)
        if: inputs.package-manager == 'yarn'
        run: yarn install --frozen-lockfile
      - name: Build
        run: ${{ inputs.package-manager == 'yarn' && 'yarn build' || 'npm run build' }}
      - name: Test
        run: ${{ inputs.package-manager == 'yarn' && 'yarn test --ci' || 'npm test -- --ci' }}
        continue-on-error: true
